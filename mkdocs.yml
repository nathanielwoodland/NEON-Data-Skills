site_name: NEON Data Tutorials
site_url: https://neon-tutorials.readthedocs.io
site_description: Hands-on tutorials for working with NEON ecological data using R and Python.
repo_url: https://github.com/NEONScience/NEON-Data-Skills
repo_name: NEONScience/NEON-Data-Skills
edit_uri: edit/main/tutorials/

docs_dir: tutorials

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  font:
    text: Inter
  palette:
    primary: custom
    accent: custom
  features:
    - navigation.indexes
    - navigation.top
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - gen-files:
      scripts:
        - gen_indexes.py


